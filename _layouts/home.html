---
layout: page
---

<div class="home">
  <h1>Привіт 👋</h1>

  {{ content }}

  <h2>Пости</h2>
  <ul class="post-list">
    {%- for post in site.posts -%}
    <li>
      <span class="post-meta">{{ post.date | date: "%d.%m.%Y" }}</span>
      <a href="{{ post.url }}">{{ post.title }}</a>
      {%- if post.excerpt -%}
        <p>{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
      {%- endif -%}
    </li>
    {%- endfor -%}
  </ul>
</div>
